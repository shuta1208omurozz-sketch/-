<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <title>Scanner + Camera Ultimate</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

    :root {
      --accent: #00d4ff;
      --accent-10: rgba(0,212,255,.1);
      --accent-20: rgba(0,212,255,.2);
      --accent-30: rgba(0,212,255,.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: #0a0c0f; color: #e0e8f0; font-family: 'Rajdhani', sans-serif; }
    #app { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .hdr { display: flex; align-items: center; gap: 10px; padding: 10px 15px; background: #0d1117; border-bottom: 1px solid #1e2a38; flex-shrink: 0; }
    .hdr-title { font-size: 15px; font-weight: 700; letter-spacing: 2px; }
    .hdr-count { margin-left: auto; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--accent); }

    /* Tabs */
    .tabs { display: flex; background: #0d1117; border-bottom: 1px solid #1e2a38; flex-shrink: 0; }
    .tab { flex: 1; padding: 12px 5px; text-align: center; font-size: 10px; font-weight: 700; cursor: pointer; color: #4a6a8a; border: none; background: none; border-bottom: 2px solid transparent; }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-10); }

    .page { flex: 1; overflow: hidden; display: none; flex-direction: column; }
    .page.on { display: flex; }

    /* Camera Viewfinder - FIX: 見切れ防止 */
    .vf-container {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid #1e2a38;
    }
    #cam-video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 全体を表示 */
    }

    /* Aspect Ratio Selector */
    .ratio-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: #0d1117;
    }
    .ratio-btn {
      padding: 6px 15px;
      background: #1a1f26;
      border: 1px solid #333;
      color: #888;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 4px;
    }
    .ratio-btn.on {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-10);
    }

    /* Controls */
    .cam-controls {
      padding: 20px 0 calc(20px + env(safe-area-inset-bottom));
      background: #0d1117;
    }
    .btn-row {
      display: flex;
      align-items: center;
      justify-content: space-around;
      max-width: 400px;
      margin: 0 auto;
    }
    .btn-shutter {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: #fff;
      border: 6px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: transform 0.05s;
    }
    .btn-shutter:active { transform: scale(0.9); background: #ddd; }
    .btn-sub {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1e2a38;
      color: #fff;
      border: 1px solid #2a3a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Barcode Scan View (Placeholder logic) */
    .scan-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
    #scan-video { width: 100%; height: 100%; object-fit: cover; }

    /* Lists */
    .list, .photo-grid { flex: 1; overflow-y: auto; padding: 10px; }
    .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .photo-item { width: 100%; aspect-ratio: 1; background: #111; overflow: hidden; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }

    /* Toast */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 12px; pointer-events: none; opacity: 0; transition: 0.3s;
    }
    .toast.show { opacity: 1; }

    /* Group Bar */
    .group-bar { padding: 8px 15px; background: #0d1117; display: flex; gap: 10px; border-bottom: 1px solid #1e2a38; }
    .group-select { background: #000; color: var(--accent); border: 1px solid #333; padding: 4px; flex: 1; }
  </style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <div class="hdr-title">SCANNER + CAMERA</div>
    <div class="hdr-count" id="hdr-count">0 BC / 0 📷</div>
  </div>

  <div class="tabs">
    <div class="tab on" data-tab="camera">📷 カメラ</div>
    <div class="tab" data-tab="scan">▶ スキャン</div>
    <div class="tab" data-tab="photos">🖼 写真</div>
    <div class="tab" data-tab="history">≡ 履歴</div>
    <div class="tab" data-tab="settings">⚙ 設定</div>
  </div>

  <!-- カメラ画面 -->
  <div class="page on" id="pg-camera">
    <div class="group-bar">
      <span>📂 グループ:</span>
      <select id="cam-group-select" class="group-select">
        <option>未分類</option>
      </select>
    </div>
    
    <div class="ratio-bar">
      <button class="ratio-btn on" data-ratio="4:3">4:3 標準</button>
      <button class="ratio-btn" data-ratio="16:9">16:9 ワイド</button>
    </div>

    <div class="vf-container">
      <video id="cam-video" muted playsinline autoplay></video>
    </div>

    <div class="cam-controls">
      <div class="btn-row">
        <button id="btn-cam-switch" class="btn-sub">🔄</button>
        <button id="btn-shutter" class="btn-shutter"></button>
        <button id="btn-goto-scan" class="btn-sub">SCAN</button>
      </div>
    </div>
  </div>

  <!-- スキャン画面 -->
  <div class="page" id="pg-scan">
    <div class="scan-area">
      <video id="scan-video" muted playsinline autoplay></video>
    </div>
    <div style="padding: 20px; background: #0d1117;">
      <button id="btn-start-scan" style="width:100%; padding: 15px; background: var(--accent); border:none; font-weight:bold;">スキャン開始</button>
    </div>
  </div>

  <!-- 写真一覧 -->
  <div class="page" id="pg-photos">
    <div class="photo-grid" id="photo-grid"></div>
  </div>

  <!-- 履歴一覧 -->
  <div class="page" id="pg-history">
    <div class="list" id="bc-list"></div>
  </div>

  <!-- 設定 -->
  <div class="page" id="pg-settings">
    <div style="padding: 20px;">
      <h3>設定</h3>
      <p style="margin-top:20px; color:#4a6a8a;">v4.1 Ultimate (Fixed)</p>
      <button onclick="clearAllData()" style="margin-top:20px; color:red; background:none; border:1px solid red; padding:10px;">全データ削除</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">撮影しました</div>

<script>
/**
 * 状態管理
 */
const state = {
  currentTab: 'camera',
  facingMode: 'environment',
  aspectRatio: 4/3,
  photos: [],
  barcodes: [],
  currentGroup: '未分類'
};

/**
 * 初期化
 */
window.addEventListener('load', () => {
  initTabs();
  startCamera();
  loadData();
  
  // シャッターボタン
  document.getElementById('btn-shutter').addEventListener('click', takePhoto);
  
  // アスペクト比切り替え
  document.querySelectorAll('.ratio-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      state.aspectRatio = btn.dataset.ratio === '16:9' ? 16/9 : 4/3;
      startCamera(); // カメラ再起動
    });
  });

  // カメラ切り替え
  document.getElementById('btn-cam-switch').addEventListener('click', () => {
    state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
    startCamera();
  });
});

/**
 * タブ切り替え
 */
function initTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      document.querySelectorAll('.tab, .page').forEach(el => el.classList.remove('on'));
      tab.classList.add('on');
      document.getElementById(`pg-${target}`).classList.add('on');
      state.currentTab = target;
      
      if (target === 'camera') startCamera();
      if (target === 'photos') renderPhotos();
    });
  });
}

/**
 * カメラ起動
 */
async function startCamera() {
  const video = document.getElementById('cam-video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(track => track.stop());
  }

  const constraints = {
    video: {
      facingMode: state.facingMode,
      aspectRatio: { ideal: state.aspectRatio },
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    },
    audio: false
  };

  try {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
  } catch (err) {
    console.error("Camera Error:", err);
    alert("カメラの起動に失敗しました。設定を確認してください。");
  }
}

/**
 * 写真撮影 (ラグ解消版)
 */
async function takePhoto() {
  const video = document.getElementById('cam-video');
  const canvas = document.createElement('canvas');
  
  // 1. 瞬時に描画サイズを決定
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d', { alpha: false });

  // 2. 映像をキャンバスに写す（この瞬間が「撮影」）
  ctx.drawImage(video, 0, 0);

  // 3. フィードバック（振動のみ、画面フラッシュなし）
  if (navigator.vibrate) navigator.vibrate(20);
  showToast("撮影しました");

  // 4. 重い変換処理は非同期で実行し、UIを止めない
  // これにより、シャッターボタンを連打できるようになる
  setTimeout(() => {
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    const newPhoto = {
      id: Date.now(),
      src: dataUrl,
      group: state.currentGroup,
      time: new Date().toLocaleTimeString()
    };
    state.photos.unshift(newPhoto);
    saveData();
    updateCount();
  }, 10);
}

/**
 * UI系
 */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function updateCount() {
  document.getElementById('hdr-count').textContent = 
    `${state.barcodes.length} BC / ${state.photos.length} 📷`;
}

function renderPhotos() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = state.photos.map(p => `
    <div class="photo-item">
      <img src="${p.src}" loading="lazy">
    </div>
  `).join('');
}

/**
 * データ保存 (簡易版: LocalStorage)
 * 大量に保存する場合は IndexedDB 推奨ですが、まずは一括コードとして完結させます
 */
function saveData() {
  try {
    // 容量制限対策で直近50枚程度に制限（LocalStorageの限界があるため）
    if (state.photos.length > 50) state.photos = state.photos.slice(0, 50);
    localStorage.setItem('sc_photos', JSON.stringify(state.photos));
  } catch(e) {
    console.warn("Storage Full");
  }
}

function loadData() {
  const p = localStorage.getItem('sc_photos');
  if (p) state.photos = JSON.parse(p);
  updateCount();
}

function clearAllData() {
  if (confirm("全てのデータを削除しますか？")) {
    localStorage.clear();
    location.reload();
  }
}

</script>
</body>
</html>
