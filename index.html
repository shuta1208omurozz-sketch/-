<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <title>Scanner + Camera Max-Wide</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

    :root {
      --accent: #00d4ff;
      --accent-10: rgba(0,212,255,.1);
      --accent-20: rgba(0,212,255,.2);
      --bg: #0a0c0f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: #e0e8f0; font-family: 'Rajdhani', sans-serif; }
    #app { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .hdr { display: flex; align-items: center; gap: 10px; padding: 10px 15px; background: #0d1117; border-bottom: 1px solid #1e2a38; flex-shrink: 0; }
    .hdr-title { font-size: 14px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }

    /* Tabs */
    .tabs { display: flex; background: #0d1117; border-bottom: 1px solid #1e2a38; flex-shrink: 0; }
    .tab { flex: 1; padding: 12px 2px; text-align: center; font-size: 10px; font-weight: 700; cursor: pointer; color: #4a6a8a; background: none; border: none; border-bottom: 2px solid transparent; }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-10); }

    .page { flex: 1; overflow: hidden; display: none; flex-direction: column; }
    .page.on { display: flex; }

    /* --- Camera Page Layout --- */
    .group-bar { padding: 6px 15px; background: #0d1117; display: flex; align-items: center; gap: 8px; font-size: 11px; color: #4a6a8a; }
    .group-select { background: #000; color: #fff; border: 1px solid #333; padding: 2px 5px; flex: 1; font-family: inherit; }

    /* 横長ビューファインダー */
    .vf-container {
      width: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      /* ここで「常に横長」な窓を作る */
      aspect-ratio: 16 / 9; 
      margin: auto 0;
      border-top: 1px solid #1e2a38;
      border-bottom: 1px solid #1e2a38;
    }
    #cam-video {
      width: 100%;
      height: 100%;
      /* containにすることで、縦長のカメラ映像を横長の枠内に「全部」表示させる */
      object-fit: contain; 
    }

    /* アスペクト比切り替え */
    .ratio-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      background: #0a0c0f;
    }
    .ratio-btn {
      padding: 5px 12px;
      background: #1a1f26;
      border: 1px solid #333;
      color: #666;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }
    .ratio-btn.on {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-10);
    }

    /* 操作ボタン */
    .cam-controls {
      padding: 15px 0 calc(15px + env(safe-area-inset-bottom));
      background: #0d1117;
      flex-shrink: 0;
    }
    .btn-row {
      display: flex;
      align-items: center;
      justify-content: space-around;
      max-width: 400px;
      margin: 0 auto;
    }
    .btn-shutter {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fff;
      border: 6px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: transform 0.05s;
      outline: none;
    }
    .btn-shutter:active { transform: scale(0.9); background: #ccc; }
    .btn-sub {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #1e2a38;
      color: #fff;
      border: 1px solid #2a3a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }

    /* Photos List */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; overflow-y: auto; }
    .photo-item { width: 100%; aspect-ratio: 1; background: #111; overflow: hidden; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }

    /* Toast */
    .toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,212,255,0.9); color: #000; padding: 12px 24px;
      font-weight: bold; border-radius: 4px; pointer-events: none; opacity: 0; transition: 0.2s; z-index: 1000;
    }
    .toast.show { opacity: 1; }

    /* Barcode List */
    .list { flex: 1; overflow-y: auto; padding: 10px; }
    .bc-card { background: #161b22; margin-bottom: 8px; padding: 10px; border-radius: 4px; border-left: 4px solid var(--accent); }
  </style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <div class="hdr-title">SCANNER + CAMERA</div>
    <div id="hdr-count" style="margin-left:auto; font-size:10px; font-family:monospace;">0 BC / 0 📷</div>
  </div>

  <div class="tabs">
    <div class="tab on" data-tab="camera">📷 カメラ</div>
    <div class="tab" data-tab="scan">▶ スキャン</div>
    <div class="tab" data-tab="photos">🖼 写真</div>
    <div class="tab" data-tab="history">≡ 履歴</div>
    <div class="tab" data-tab="settings">⚙</div>
  </div>

  <!-- カメラ画面 -->
  <div class="page on" id="pg-camera">
    <div class="group-bar">
      <span>📂 GROUP:</span>
      <select id="cam-group-select" class="group-select">
        <option>未分類</option>
      </select>
    </div>
    
    <div class="ratio-bar">
      <button class="ratio-btn" data-ratio="4/3">4:3 (標準)</button>
      <button class="ratio-btn on" data-ratio="16/9">16:9 (ワイド)</button>
      <button class="ratio-btn" data-ratio="21/9">21:9 (シネマ)</button>
    </div>

    <!-- 常に横長のコンテナ -->
    <div class="vf-container" id="vf-container">
      <video id="cam-video" muted playsinline autoplay></video>
    </div>

    <div class="cam-controls">
      <div class="btn-row">
        <button id="btn-cam-switch" class="btn-sub">🔄</button>
        <button id="btn-shutter" class="btn-shutter"></button>
        <button id="btn-goto-scan" class="btn-sub" style="font-size:10px; font-weight:bold;">SCAN</button>
      </div>
    </div>
  </div>

  <!-- 他のページ（簡易実装） -->
  <div class="page" id="pg-scan">
    <div style="flex:1; background:#000; position:relative;">
      <video id="scan-video" style="width:100%; height:100%; object-fit:cover;"></video>
      <div style="position:absolute; inset:0; border:2px dashed var(--accent); margin:100px 40px;"></div>
    </div>
  </div>

  <div class="page" id="pg-photos">
    <div class="photo-grid" id="photo-grid"></div>
  </div>

  <div class="page" id="pg-history">
    <div class="list" id="bc-list"></div>
  </div>

  <div class="page" id="pg-settings">
    <div style="padding: 20px;">
      <button onclick="clearData()" style="color:#ff4466; border:1px solid #ff4466; background:none; padding:10px; width:100%;">全データ削除</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">SAVED</div>

<script>
/**
 * 状態管理
 */
const state = {
  currentTab: 'camera',
  facingMode: 'environment',
  aspectRatio: 16/9,
  photos: [],
  barcodes: []
};

/**
 * 初期化
 */
window.addEventListener('load', () => {
  initTabs();
  startCamera();
  loadData();
  
  // シャッターボタン
  document.getElementById('btn-shutter').addEventListener('click', takePhoto);
  
  // アスペクト比/形状切り替え
  document.querySelectorAll('.ratio-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      
      const ratioStr = btn.dataset.ratio; // "16/9" など
      const ratioParts = ratioStr.split('/');
      const ratioValue = ratioParts[0] / ratioParts[1];
      
      // ビューファインダーの枠自体を変える
      document.getElementById('vf-container').style.aspectRatio = ratioStr;
      state.aspectRatio = ratioValue;
      
      startCamera(); 
    });
  });

  // カメラ切り替え
  document.getElementById('btn-cam-switch').addEventListener('click', () => {
    state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
    startCamera();
  });
});

/**
 * タブ
 */
function initTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      document.querySelectorAll('.tab, .page').forEach(el => el.classList.remove('on'));
      tab.classList.add('on');
      document.getElementById(`pg-${target}`).classList.add('on');
      if (target === 'photos') renderPhotos();
    });
  });
}

/**
 * カメラ起動
 */
async function startCamera() {
  const video = document.getElementById('cam-video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }

  // スマホを縦に持っていても横長の解像度を優先的に要求する
  const constraints = {
    video: {
      facingMode: state.facingMode,
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      aspectRatio: { ideal: state.aspectRatio }
    }
  };

  try {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
  } catch (err) {
    console.error(err);
  }
}

/**
 * 写真撮影 (ラグなし)
 */
function takePhoto() {
  const video = document.getElementById('cam-video');
  const canvas = document.createElement('canvas');
  
  // 1. その瞬間のサイズでキャンバス作成
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d', { alpha: false });

  // 2. 描画（この処理は一瞬）
  ctx.drawImage(video, 0, 0);

  // 3. フィードバック（音・振動）
  if (navigator.vibrate) navigator.vibrate(15);
  showToast("SAVED");

  // 4. 重い保存処理はバックグラウンドで
  setTimeout(() => {
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    state.photos.unshift({ id: Date.now(), src: dataUrl });
    saveData();
    updateCount();
  }, 10);
}

/**
 * UI/データ管理
 */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1000);
}

function updateCount() {
  document.getElementById('hdr-count').textContent = `${state.barcodes.length} BC / ${state.photos.length} 📷`;
}

function renderPhotos() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = state.photos.map(p => `
    <div class="photo-item"><img src="${p.src}"></div>
  `).join('');
}

function saveData() {
  try {
    if (state.photos.length > 100) state.photos = state.photos.slice(0, 100);
    localStorage.setItem('scanner_photos', JSON.stringify(state.photos));
  } catch(e) {}
}

function loadData() {
  const p = localStorage.getItem('scanner_photos');
  if (p) state.photos = JSON.parse(p);
  updateCount();
}

function clearData() {
  if (confirm("全データを削除しますか？")) {
    localStorage.clear();
    location.reload();
  }
}
</script>
</body>
</html>
