<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Scanner"/>

<title>Scanner + Camera</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#0a0c0f;}
body{color:#e0e8f0;font-family:'Rajdhani',sans-serif;}

/* APP SHELL */
#app{height:100%;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:#0a0c0f;}

/* HEADER */
.hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;padding-top:max(12px,env(safe-area-inset-top));background:#0d1117;border-bottom:1px solid #1e2a38;flex-shrink:0;}
.hdr-icon{width:28px;height:28px;background:#00d4ff;flex-shrink:0;display:flex;align-items:center;justify-content:center;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;}
.hdr-sub{font-family:'Share Tech Mono',monospace;font-size:8px;color:#4a6a8a;letter-spacing:2px;}
.hdr-count{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:9px;color:#00d4ff;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);padding:3px 7px;white-space:nowrap;}

/* TABS */
.tabs{display:flex;background:#0d1117;border-bottom:1px solid #1e2a38;flex-shrink:0;}
.tab{flex:1;padding:10px 2px;text-align:center;font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:#4a6a8a;border:none;background:none;border-bottom:2px solid transparent;font-family:'Rajdhani',sans-serif;transition:color .2s,border-color .2s;}
.tab.on{color:#00d4ff;border-bottom-color:#00d4ff;background:rgba(0,212,255,0.04);}

/* TAB PAGES */
.page{flex:1;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;-webkit-overflow-scrolling:touch;}
.page.on{display:flex;}

/* SCAN PAGE */
.scan-pg{align-items:center;padding:12px 14px;gap:10px;}
.mode-row{width:100%;max-width:360px;display:flex;border:1px solid #1e2a38;overflow:hidden;}
.mode-btn{flex:1;padding:8px 4px;text-align:center;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;background:#0d1117;color:#4a6a8a;transition:all .2s;font-family:'Rajdhani',sans-serif;}
.mode-btn+.mode-btn{border-left:1px solid #1e2a38;}
.mode-btn.on{background:rgba(0,212,255,0.1);color:#00d4ff;}
.badge{display:inline-block;font-size:7px;font-family:'Share Tech Mono',monospace;background:rgba(255,170,0,0.15);color:#ffaa00;border:1px solid rgba(255,170,0,0.3);padding:1px 4px;margin-left:4px;vertical-align:middle;}
.finder{position:relative;width:100%;max-width:360px;aspect-ratio:4/3;background:#060809;border:1px solid #1e2a38;overflow:hidden;}
.finder video{width:100%;height:100%;object-fit:cover;display:block;}
.corner{position:absolute;width:18px;height:18px;border-color:#00d4ff;border-style:solid;z-index:2;pointer-events:none;}
.corner.tl{top:8px;left:8px;border-width:2px 0 0 2px;}
.corner.tr{top:8px;right:8px;border-width:2px 2px 0 0;}
.corner.bl{bottom:8px;left:8px;border-width:0 0 2px 2px;}
.corner.br{bottom:8px;right:8px;border-width:0 2px 2px 0;}
.scan-line{position:absolute;left:8px;right:8px;height:1px;background:linear-gradient(90deg,transparent,#00d4ff,transparent);animation:scanMove 2s ease-in-out infinite;z-index:2;box-shadow:0 0 5px #00d4ff;pointer-events:none;}
@keyframes scanMove{0%{top:15%}50%{top:80%}100%{top:15%}}
.ean-guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none;}
.ean-box{border:1.5px dashed rgba(255,170,0,0.5);width:80%;height:36%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.ean-line{position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(90deg,transparent,#ffaa00,transparent);box-shadow:0 0 5px #ffaa00;animation:eanP 1.2s ease-in-out infinite;}
@keyframes eanP{0%,100%{opacity:.3}50%{opacity:1}}
.ean-txt{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,170,0,.7);letter-spacing:1px;text-align:center;}
.finder-ov{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(0,212,255,.6);z-index:2;pointer-events:none;}
.finder-ov.ean{color:rgba(255,170,0,.6);}
