<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <title>Scanner + Camera Ultra-Wide</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

    :root {
      --accent: #00d4ff;
      --accent-10: rgba(0,212,255,.1);
      --bg: #0a0c0f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: #e0e8f0; font-family: 'Rajdhani', sans-serif; }
    #app { height: 100dvh; display: flex; flex-direction: column; }

    /* Header */
    .hdr { display: flex; align-items: center; padding: 10px 15px; background: #0d1117; border-bottom: 1px solid #1e2a38; flex-shrink: 0; }
    .hdr-title { font-size: 14px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }

    /* Tabs */
    .tabs { display: flex; background: #0d1117; border-bottom: 1px solid #1e2a38; flex-shrink: 0; }
    .tab { flex: 1; padding: 12px 2px; text-align: center; font-size: 10px; font-weight: 700; cursor: pointer; color: #4a6a8a; background: none; border: none; border-bottom: 2px solid transparent; }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-10); }

    .page { flex: 1; overflow: hidden; display: none; flex-direction: column; }
    .page.on { display: flex; }

    /* --- Camera Viewfinder: 端まで映像を詰める設定 --- */
    .vf-container {
      width: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      /* ここで横長の比率を固定 */
      aspect-ratio: 16 / 9; 
      margin: auto 0;
      border-top: 1px solid #1e2a38;
      border-bottom: 1px solid #1e2a38;
    }
    #cam-video {
      width: 100%;
      height: 100%;
      /* FIX: containをcoverに変更して隙間をなくす */
      object-fit: cover; 
    }

    /* アスペクト比切り替え */
    .ratio-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      background: #0a0c0f;
    }
    .ratio-btn {
      padding: 5px 12px;
      background: #1a1f26;
      border: 1px solid #333;
      color: #666;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 3px;
    }
    .ratio-btn.on {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-10);
    }

    /* Controls: 下部に配置 */
    .cam-controls {
      padding: 20px 0 calc(20px + env(safe-area-inset-bottom));
      background: #0d1117;
      flex-shrink: 0;
    }
    .btn-row {
      display: flex;
      align-items: center;
      justify-content: space-around;
      max-width: 400px;
      margin: 0 auto;
    }
    .btn-shutter {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #fff;
      border: 8px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: transform 0.05s;
    }
    .btn-shutter:active { transform: scale(0.9); background: #ddd; }
    .btn-sub {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1e2a38;
      color: #fff;
      border: 1px solid #2a3a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Photos List */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; overflow-y: auto; }
    .photo-item { width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; border: 1px solid #1e2a38; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }

    /* Toast Notifications */
    .toast {
      position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #000; padding: 8px 20px;
      font-weight: bold; font-size: 12px; border-radius: 2px; pointer-events: none; opacity: 0; transition: 0.2s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <div class="hdr-title">ULTRA-WIDE CAMERA</div>
    <div id="hdr-count" style="margin-left:auto; font-size:10px; font-family:monospace; color:var(--accent);">0 BC / 0 📷</div>
  </div>

  <div class="tabs">
    <div class="tab on" data-tab="camera">📷 カメラ</div>
    <div class="tab" data-tab="scan">▶ スキャン</div>
    <div class="tab" data-tab="photos">🖼 写真</div>
    <div class="tab" data-tab="history">≡ 履歴</div>
    <div class="tab" data-tab="settings">⚙</div>
  </div>

  <!-- カメラ画面 -->
  <div class="page on" id="pg-camera">
    <div class="ratio-bar">
      <button class="ratio-btn" data-ratio="4/3">4:3 標準</button>
      <button class="ratio-btn on" data-ratio="16/9">16:9 ワイド</button>
      <button class="ratio-btn" data-ratio="21/9">21:9 シネマ</button>
    </div>

    <!-- 映像が端まで詰まるコンテナ -->
    <div class="vf-container" id="vf-container">
      <video id="cam-video" muted playsinline autoplay></video>
    </div>

    <div class="cam-controls">
      <div class="btn-row">
        <button id="btn-cam-switch" class="btn-sub">🔄</button>
        <button id="btn-shutter" class="btn-shutter"></button>
        <button id="btn-goto-scan" class="btn-sub" style="font-size:10px; font-weight:bold;">SCAN</button>
      </div>
    </div>
  </div>

  <!-- 写真一覧 -->
  <div class="page" id="pg-photos">
    <div class="photo-grid" id="photo-grid"></div>
  </div>

  <!-- その他 (スキャン等は枠組みのみ) -->
  <div class="page" id="pg-scan">
    <div style="flex:1; background:#000; display:flex; align-items:center; justify-content:center;">
      <p style="color:#4a6a8a; font-size:12px;">SCANNER MODE</p>
    </div>
  </div>

  <div class="page" id="pg-history">
    <div style="padding:20px; font-size:12px; color:#4a6a8a;">バーコード履歴はここに表示されます</div>
  </div>

  <div class="page" id="pg-settings">
    <div style="padding:20px;">
      <button onclick="localStorage.clear(); location.reload();" style="color:red; border:1px solid red; background:none; padding:10px; width:100%;">データ全消去</button>
    </div>
  </div>
</div>

<div id="toast" class="toast">SHOT!</div>

<script>
const state = {
  facingMode: 'environment',
  aspectRatio: 16/9,
  photos: []
};

window.addEventListener('load', () => {
  initTabs();
  startCamera();
  
  // 保存された写真の読み込み
  const saved = localStorage.getItem('ultra_wide_photos');
  if (saved) state.photos = JSON.parse(saved);
  updateCount();

  // シャッターボタン (ラグなし)
  document.getElementById('btn-shutter').addEventListener('click', takePhoto);
  
  // 比率切り替え
  document.querySelectorAll('.ratio-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      
      const rStr = btn.dataset.ratio;
      const parts = rStr.split('/');
      state.aspectRatio = parts[0] / parts[1];
      
      // プレビュー枠の形を変える
      document.getElementById('vf-container').style.aspectRatio = rStr;
      
      startCamera();
    });
  });

  document.getElementById('btn-cam-switch').addEventListener('click', () => {
    state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
    startCamera();
  });
});

function initTabs() {
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab, .page').forEach(el => el.classList.remove('on'));
      t.classList.add('on');
      const target = t.dataset.tab;
      document.getElementById(`pg-${target}`).classList.add('on');
      if (target === 'photos') renderPhotos();
    });
  });
}

async function startCamera() {
  const video = document.getElementById('cam-video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(track => track.stop());
  }

  const constraints = {
    video: {
      facingMode: state.facingMode,
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      aspectRatio: { ideal: state.aspectRatio }
    }
  };

  try {
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
  } catch (err) {
    console.error("Camera error:", err);
  }
}

/**
 * 撮影処理：
 * 画面で見えている「横長」の部分だけを正確に切り取って保存します
 */
function takePhoto() {
  const video = document.getElementById('cam-video');
  const canvas = document.createElement('canvas');
  
  // 目標の横長サイズを計算
  const targetW = video.videoWidth;
  const targetH = targetW / state.aspectRatio;
  
  canvas.width = targetW;
  canvas.height = targetH;
  
  const ctx = canvas.getContext('2d', { alpha: false });
  
  // 縦長の元映像から、中央の横長部分だけを抽出して描画
  const offsetY = (video.videoHeight - targetH) / 2;
  ctx.drawImage(video, 0, offsetY, targetW, targetH, 0, 0, targetW, targetH);

  // フィードバック
  if (navigator.vibrate) navigator.vibrate(10);
  showToast("SAVED");

  // 保存処理を非同期にしてラグをゼロにする
  setTimeout(() => {
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    state.photos.unshift({ src: dataUrl, id: Date.now() });
    
    // 容量制限のため最新30枚程度に維持
    if (state.photos.length > 30) state.photos.pop();
    
    localStorage.setItem('ultra_wide_photos', JSON.stringify(state.photos));
    updateCount();
  }, 0);
}

function renderPhotos() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = state.photos.map(p => `
    <div class="photo-item"><img src="${p.src}"></div>
  `).join('');
}

function updateCount() {
  document.getElementById('hdr-count').textContent = `0 BC / ${state.photos.length} 📷`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 800);
}
</script>
</body>
</html>
