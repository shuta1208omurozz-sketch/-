<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Scanner"/>
<meta name="theme-color" content="#0d1117"/>
<title>Scanner + Camera</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0a0c0f}
body{color:#e0e8f0;font-family:'Rajdhani',sans-serif}
#app{height:100%;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:#0a0c0f}

.hdr{display:flex;align-items:center;gap:10px;padding:9px 14px;padding-top:max(9px,env(safe-area-inset-top));background:#0d1117;border-bottom:1px solid #1e2a38;flex-shrink:0}
.hdr-icon{width:26px;height:26px;background:#00d4ff;flex-shrink:0;display:flex;align-items:center;justify-content:center;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px))}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.hdr-sub{font-family:'Share Tech Mono',monospace;font-size:8px;color:#4a6a8a;letter-spacing:2px}
.hdr-count{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:9px;color:#00d4ff;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);padding:3px 7px;white-space:nowrap}

.tabs{display:flex;background:#0d1117;border-bottom:1px solid #1e2a38;flex-shrink:0}
.tab{flex:1;padding:9px 1px;text-align:center;font-size:8.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:#4a6a8a;border:none;background:none;border-bottom:2px solid transparent;font-family:'Rajdhani',sans-serif;transition:color .2s,border-color .2s}
.tab.on{color:#00d4ff;border-bottom-color:#00d4ff;background:rgba(0,212,255,.04)}
.page{flex:1;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;-webkit-overflow-scrolling:touch;min-height:0}
.page.on{display:flex}

/* ═══ SCAN ═══ */
.scan-pg{padding:0;gap:0;overflow:hidden}
.scan-top{display:flex;flex-direction:column;align-items:center;padding:6px 10px;gap:5px;flex:1;min-height:0;overflow:hidden}
.mode-row{width:100%;max-width:420px;display:flex;border:1px solid #1e2a38;overflow:hidden;flex-shrink:0}
.mode-btn{flex:1;padding:6px 4px;text-align:center;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;background:#0d1117;color:#4a6a8a;transition:all .2s;font-family:'Rajdhani',sans-serif}
.mode-btn+.mode-btn{border-left:1px solid #1e2a38}
.mode-btn.on{background:rgba(0,212,255,.1);color:#00d4ff}
.badge{display:inline-block;font-size:7px;font-family:'Share Tech Mono',monospace;background:rgba(255,170,0,.15);color:#ffaa00;border:1px solid rgba(255,170,0,.3);padding:1px 4px;margin-left:4px;vertical-align:middle}
/* finder flex:1 → カメラ最大化 */
.finder{position:relative;width:100%;max-width:420px;flex:1;min-height:0;background:#060809;border:1px solid #1e2a38;overflow:hidden}
.finder video{width:100%;height:100%;object-fit:cover;display:block}
.corner{position:absolute;width:22px;height:22px;border-color:#00d4ff;border-style:solid;z-index:2;pointer-events:none}
.corner.tl{top:10px;left:10px;border-width:2px 0 0 2px}.corner.tr{top:10px;right:10px;border-width:2px 2px 0 0}
.corner.bl{bottom:10px;left:10px;border-width:0 0 2px 2px}.corner.br{bottom:10px;right:10px;border-width:0 2px 2px 0}
.scan-line{position:absolute;left:10px;right:10px;height:1px;background:linear-gradient(90deg,transparent,#00d4ff,transparent);animation:scanMove 2s ease-in-out infinite;z-index:2;box-shadow:0 0 6px #00d4ff;pointer-events:none}
@keyframes scanMove{0%{top:15%}50%{top:82%}100%{top:15%}}
.ean-guide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none}
.ean-box{border:2px dashed rgba(255,170,0,.55);width:88%;height:28%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.ean-line{position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(90deg,transparent,#ffaa00,transparent);box-shadow:0 0 6px #ffaa00;animation:eanP 1.1s ease-in-out infinite}
@keyframes eanP{0%,100%{opacity:.3}50%{opacity:1}}
.ean-txt{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,170,0,.75);letter-spacing:1px}
.finder-ov{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(0,212,255,.7);z-index:2;pointer-events:none}
.finder-ov.ean{color:rgba(255,170,0,.7)}
/* 検出フラッシュオーバーレイ（短い点滅のみ） */
.finder-flash{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;background:rgba(0,255,136,.18);transition:opacity .08s}
.finder-flash.show{opacity:1}
.ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.ph p{font-family:'Share Tech Mono',monospace;font-size:10px;text-align:center;max-width:200px;line-height:1.8;color:#3a5a7a}
.sbar{width:100%;max-width:420px;padding:6px 12px;background:#0d1117;border:1px solid #1e2a38;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:#4a6a8a;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;background:#2a3a4a;flex-shrink:0;transition:background .3s,box-shadow .3s}
.sdot.go{background:#00d4ff;box-shadow:0 0 6px #00d4ff;animation:pulse 1.2s ease-in-out infinite}
.sdot.go.ean{background:#ffaa00;box-shadow:0 0 6px #ffaa00}
.sdot.ok{background:#00ff88;box-shadow:0 0 6px #00ff88}
.sdot.err{background:#ff4466;box-shadow:0 0 6px #ff4466}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-main{width:100%;max-width:420px;padding:11px;background:#00d4ff;color:#0a0c0f;border:none;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));transition:background .2s,transform .1s;flex-shrink:0}
.btn-main:active{transform:scale(.98)}.btn-main.stop{background:#ff4466}

/* ─ 大型バーコード表示エリア ─ */
.scan-bc-section{flex-shrink:0;height:200px;border-top:2px solid #1e2a38;background:#080b0f;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
.scan-bc-placeholder{font-family:'Share Tech Mono',monospace;font-size:11px;color:#2a3a4a;letter-spacing:2px;text-align:center}
.scan-bc-display{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px 8px}
/* バーコード画像 */
.scan-bc-canvas-wrap{width:100%;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;background:#fff;overflow:hidden}
.scan-bc-canvas-wrap canvas{width:100% !important;height:auto !important;max-height:140px;display:block}
/* バーコード数値 大きく */
.scan-bc-val{font-family:'Share Tech Mono',monospace;font-size:clamp(18px,5.5vw,28px);color:#e0e8f0;font-weight:700;letter-spacing:3px;text-align:center;line-height:1}
.scan-bc-footer{display:flex;align-items:center;gap:10px;flex-shrink:0}
.scan-bc-meta{font-family:'Share Tech Mono',monospace;font-size:9px;color:#4a6a8a;letter-spacing:1px}
.scan-bc-copy{padding:4px 12px;background:transparent;border:1px solid rgba(0,212,255,.3);color:#00d4ff;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer}
.scan-bc-dup{position:absolute;top:6px;right:8px;font-family:'Share Tech Mono',monospace;font-size:9px;color:#ffaa00;letter-spacing:1px;display:none}
.scan-bc-dup.show{display:block}

/* ═══ HISTORY ═══ */
.hist-pg{overflow:hidden}
.toolbar{display:flex;align-items:center;gap:7px;padding:7px 12px;border-bottom:1px solid #1e2a38;background:#0d1117;flex-shrink:0}
.sbox{flex:1;background:#0a0c0f;border:1px solid #1e2a38;padding:7px 10px;font-family:'Share Tech Mono',monospace;font-size:11px;color:#e0e8f0;outline:none;transition:border-color .2s}
.sbox::placeholder{color:#2a3a4a}.sbox:focus{border-color:#00d4ff}
.btn-sm{padding:5px 10px;background:transparent;border:1px solid #2a3a4a;color:#4a6a8a;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.btn-sm.danger{color:#ff4466}.btn-sm.accent{color:#00d4ff;border-color:#1e2a38}
.hist-filter-row{display:flex;align-items:center;gap:5px;padding:5px 12px;background:#0d1117;border-bottom:1px solid #1e2a38;flex-shrink:0}
.hist-filter-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#4a6a8a;flex-shrink:0}
.flt-btn{padding:3px 9px;background:transparent;border:1px solid #1e2a38;color:#4a6a8a;font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s}
.flt-btn.on{border-color:#00d4ff;color:#00d4ff;background:rgba(0,212,255,.07)}
.flt-btn.grn.on{border-color:#00ff88;color:#00ff88;background:rgba(0,255,136,.07)}
.list{flex:1;overflow-y:auto;padding:6px 12px;display:flex;flex-direction:column;gap:4px;-webkit-overflow-scrolling:touch}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#2a3a4a;padding:40px;text-align:center}
.empty p{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;line-height:1.9}
.bc-card{background:#0d1117;border:1px solid #1e2a38;padding:6px 8px;display:flex;align-items:center;gap:7px;position:relative;overflow:hidden;transition:border-color .2s,background .2s}
.bc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#00d4ff}
.bc-card.ean::before{background:#ffaa00}
.bc-card.checked{background:rgba(0,255,136,.06);border-color:rgba(0,255,136,.28)}
.bc-card.checked::before{background:#00ff88}
.card-check{width:30px;height:30px;border-radius:50%;border:1.5px solid #2a3a4a;background:transparent;color:#2a3a4a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:13px;-webkit-tap-highlight-color:transparent}
.bc-card.checked .card-check{border-color:#00ff88;background:rgba(0,255,136,.15);color:#00ff88}
.bc-thumb{background:#fff;width:90px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:2px}
.bc-thumb canvas{width:86px !important;height:auto !important;display:block}
.bc-thumb-txt{font-family:monospace;font-size:7px;color:#aaa;text-align:center;line-height:1.3;padding:2px}
.card-info{flex:1;min-width:0;cursor:pointer}
.card-val{font-family:'Share Tech Mono',monospace;font-size:11px;color:#e0e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.card-fmt{font-size:8px;font-weight:700;letter-spacing:2px;color:#00d4ff;text-transform:uppercase}
.card-fmt.ean{color:#ffaa00}
.card-time{font-family:'Share Tech Mono',monospace;font-size:8px;color:#2a3a4a}
.card-num{font-family:'Share Tech Mono',monospace;font-size:8px;color:#2a3a4a}
.card-chk-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:#00ff88}
.btn-x{background:none;border:none;color:#2a3a4a;cursor:pointer;padding:5px;font-size:14px;line-height:1;flex-shrink:0}
.btn-x:active{color:#ff4466}

/* ═══ CAMERA ═══ */
.cam-pg{align-items:center;padding:0 10px 6px;gap:4px;overflow:hidden;padding-bottom:max(6px,env(safe-area-inset-bottom))}
.vf{position:relative;width:100%;max-width:440px;border:1px solid #1e2a38;overflow:hidden;background:#000;flex:1;min-height:0}
.vf video{width:100%;height:100%;display:block;object-fit:cover}
.flash{position:absolute;inset:0;background:#fff;z-index:10;pointer-events:none;opacity:0;transition:opacity .05s}
.flash.on{opacity:1}
.focus-ring{position:absolute;width:64px;height:64px;border:2px solid #ffdd00;border-radius:4px;pointer-events:none;z-index:5;transform:translate(-50%,-50%) scale(1.2);transition:transform .15s,opacity .3s;opacity:0}
.focus-ring.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.focus-ring::before,.focus-ring::after{content:'';position:absolute;background:#ffdd00}
.focus-ring::before{left:50%;top:-6px;width:1px;height:5px;transform:translateX(-50%)}
.focus-ring::after{top:50%;left:-6px;height:1px;width:5px;transform:translateY(-50%)}
.err-box{width:100%;max-width:440px;padding:10px 12px;background:rgba(255,68,102,.07);border:1px solid rgba(255,68,102,.35);display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.err-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;color:#ff4466;text-transform:uppercase}
.err-code-badge{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:9px;color:#ff8888;background:rgba(255,68,102,.15);border:1px solid rgba(255,68,102,.3);padding:1px 6px;letter-spacing:2px}
.err-body{font-family:'Share Tech Mono',monospace;font-size:9px;color:#cc8888;line-height:1.7}
.err-retry{padding:6px 12px;background:transparent;border:1px solid rgba(255,68,102,.4);color:#ff8899;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;align-self:flex-start}
.zoom-row{width:100%;max-width:440px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.zoom-lbl{font-family:'Share Tech Mono',monospace;font-size:11px;color:#00d4ff;width:36px;text-align:right;white-space:nowrap;flex-shrink:0}
input[type=range]{flex:1;-webkit-appearance:none;height:2px;background:#1e2a38;outline:none;cursor:pointer;border-radius:1px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#00d4ff;cursor:pointer}
.quality-row{width:100%;max-width:440px;display:flex;align-items:center;gap:5px;flex-shrink:0}
.quality-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#4a6a8a;white-space:nowrap;flex-shrink:0}
.quality-btn{flex:1;padding:4px 2px;text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;border:1px solid #1e2a38;background:#0d1117;color:#4a6a8a;font-family:'Rajdhani',sans-serif;transition:all .2s}
.quality-btn.on{border-color:#00d4ff;color:#00d4ff;background:rgba(0,212,255,.08)}
.cam-ctrl{width:100%;max-width:440px;display:flex;align-items:center;justify-content:space-around;padding:0 4px;flex-shrink:0}
.ctrl-btn{width:50px;height:50px;border-radius:50%;border:1px solid #1e2a38;background:#0d1117;color:#8ab4cc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{border-color:#00d4ff;color:#00d4ff}
.ctrl-btn.red{border-color:#ff4466;color:#ff4466}
.ctrl-btn.torch-on{border-color:#ffdd00 !important;color:#ffdd00 !important;box-shadow:0 0 10px rgba(255,221,0,.35)}
.ctrl-btn.hilite{border-color:#00d4ff;color:#00d4ff}
.shutter{width:68px;height:68px;border-radius:50%;border:3px solid #e0e8f0;background:transparent;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.shutter::after{content:'';width:52px;height:52px;border-radius:50%;background:#e0e8f0;display:block;transition:transform .1s}
.shutter:active::after{transform:scale(.85)}.shutter:disabled{opacity:.3;cursor:default}
/* サムネ・向きバー（下に配置） */
.thumb-strip-wrap{width:100%;max-width:440px;flex-shrink:0}
.thumb-strip-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.thumb-strip-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#4a6a8a;letter-spacing:1px}
.thumb-toggle-btn{background:none;border:1px solid #1e2a38;color:#4a6a8a;font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 8px;cursor:pointer;letter-spacing:1px}
.thumb-toggle-btn.on{border-color:#00d4ff;color:#00d4ff}
.thumb-strip{display:flex;gap:3px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.thumb-strip::-webkit-scrollbar{display:none}
.mini-thumb{width:52px;height:52px;flex-shrink:0;overflow:hidden;cursor:pointer;border:1px solid #1e2a38}
.mini-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.more-btn{width:52px;height:52px;flex-shrink:0;background:#0d1117;border:1px solid #1e2a38;color:#4a6a8a;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;display:flex;align-items:center;justify-content:center}
.cam-bottom-row{width:100%;max-width:440px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:2px 0}
.orient-bar{display:flex;align-items:center;gap:7px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px}
.orient-dot{width:8px;height:8px;border-radius:50%;background:#2a3a4a;flex-shrink:0;transition:background .3s,box-shadow .3s}
.orient-dot.ok{background:#00ff88;box-shadow:0 0 5px rgba(0,255,136,.5)}.orient-dot.warn{background:#ffaa00;box-shadow:0 0 5px rgba(255,170,0,.5)}
.orient-label{color:#4a6a8a}.orient-label.ok{color:#00ff88}.orient-label.warn{color:#ffaa00}
.save-folder-row{width:100%;max-width:440px;background:#0d1117;border:1px solid #1e2a38;padding:8px 10px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.save-folder-hdr{display:flex;align-items:center;justify-content:space-between}
.save-folder-label{font-size:10px;font-weight:700;letter-spacing:2px;color:#4a6a8a;text-transform:uppercase;font-family:'Rajdhani',sans-serif}
.save-folder-android{font-size:8px;font-family:'Share Tech Mono',monospace;color:#ffaa00;background:rgba(255,170,0,.1);border:1px solid rgba(255,170,0,.3);padding:1px 5px;letter-spacing:1px}
.save-folder-path{font-family:'Share Tech Mono',monospace;font-size:9px;color:#8ab4cc;word-break:break-all;min-height:12px}
.save-folder-path.none{color:#2a3a4a;font-style:italic}
.btn-folder-pick{padding:4px 10px;background:transparent;border:1px solid rgba(0,212,255,.3);color:#00d4ff;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-folder-clear{padding:4px 8px;background:transparent;border:1px solid #2a3a4a;color:#4a6a8a;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;cursor:pointer}
.save-folder-note{font-family:'Share Tech Mono',monospace;font-size:7px;color:#2a3a4a;line-height:1.5}

/* ═══ PHOTOS ═══ */
.photo-pg{overflow:hidden}
.photo-toolbar{display:flex;align-items:center;gap:6px;padding:7px 12px;border-bottom:1px solid #1e2a38;background:#0d1117;flex-shrink:0}
.photo-count{font-family:'Share Tech Mono',monospace;font-size:10px;color:#4a6a8a;flex:1}
.merge-bar{display:none;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid rgba(0,212,255,.2);background:rgba(0,212,255,.04);flex-shrink:0}
.merge-bar.on{display:flex}
.merge-bar-txt{font-family:'Share Tech Mono',monospace;font-size:10px;color:#00d4ff;flex:1}
.btn-merge-exec{padding:7px 14px;background:#00d4ff;color:#0a0c0f;border:none;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px))}
.btn-merge-exec:disabled{opacity:.4;cursor:default}
.btn-merge-cancel{padding:7px 10px;background:transparent;border:1px solid #2a3a4a;color:#4a6a8a;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.photo-grid{flex:1;overflow-y:auto;padding:3px;display:grid;grid-template-columns:repeat(3,1fr);gap:3px;-webkit-overflow-scrolling:touch}
.photo-item{aspect-ratio:1;ove
