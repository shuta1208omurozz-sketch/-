<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <title>Ultra Wide Pro Camera (Intuitive Swipe)</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

    :root {
      --accent: #00d4ff;
      --bg: #0a0c0f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: #e0e8f0; font-family: 'Rajdhani', sans-serif; }
    #app { height: 100dvh; display: flex; flex-direction: column; }

    /* Header */
    .hdr { display: flex; align-items: center; padding: 12px 15px; background: #0d1117; border-bottom: 1px solid #1e2a38; flex-shrink: 0; }
    .hdr-title { font-size: 14px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }
    .hdr-count { margin-left: auto; font-family: 'Share Tech Mono', monospace; font-size: 10px; opacity: 0.7; }

    /* Tabs */
    .tabs { display: flex; background: #0d1117; border-bottom: 1px solid #1e2a38; flex-shrink: 0; }
    .tab { flex: 1; padding: 14px 2px; text-align: center; font-size: 10px; font-weight: 700; cursor: pointer; color: #4a6a8a; background: none; border: none; border-bottom: 2px solid transparent; }
    .tab.on { color: var(--accent); border-bottom-color: var(--accent); }

    .page { flex: 1; overflow: hidden; display: none; flex-direction: column; position: relative; }
    .page.on { display: flex; }

    /* --- Viewfinder --- */
    .vf-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
    .vf-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      border-top: 1px solid #1e2a38;
      border-bottom: 1px solid #1e2a38;
      transition: aspect-ratio 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #cam-video { width: 100%; height: 100%; object-fit: cover; }

    /* --- Controls Area (Swipe Zone) --- */
    .cam-controls {
      padding: 15px 15px calc(20px + env(safe-area-inset-bottom));
      background: #0d1117;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      touch-action: none; /* スワイプを優先 */
    }

    /* 左側: 比率ボタン (上から4:3, 16:9, 21:9) */
    .ratio-ctrls { display: flex; flex-direction: column; gap: 5px; }
    .ratio-btn {
      width: 50px; padding: 5px 0; background: #1a1f26; border: 1px solid #333;
      color: #666; font-size: 9px; font-weight: 700; cursor: pointer; border-radius: 3px; text-align: center;
    }
    .ratio-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(0, 212, 255, 0.1); }

    /* 中央: シャッター */
    .shutter-wrap { display: flex; justify-content: center; }
    .btn-shutter {
      width: 78px; height: 78px; border-radius: 50%; background: #fff;
      border: 6px solid rgba(255,255,255,0.2); cursor: pointer; transition: transform 0.05s;
    }
    .btn-shutter:active { transform: scale(0.9); background: #ccc; }

    /* 右側: SCANリンク */
    .side-right { display: flex; justify-content: flex-end; }
    .btn-scan-link {
      width: 50px; height: 50px; border-radius: 50%; background: #1e2a38;
      border: 1px solid #2a3a4a; color: var(--accent); font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    /* --- Photos Grid --- */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; overflow-y: auto; }
    .photo-item { width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; border: 1px solid #1e2a38; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }

    .toast {
      position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
      background: var(--accent); color: #000; padding: 10px 20px;
      font-weight: bold; border-radius: 2px; pointer-events: none; opacity: 0; transition: 0.15s; z-index: 1000;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <div class="hdr-title">ULTRA WIDE CAMERA</div>
    <div id="hdr-count" class="hdr-count">0 BC / 0 📷</div>
  </div>

  <div class="tabs">
    <div class="tab on" data-tab="camera">📷 カメラ</div>
    <div class="tab" data-tab="scan">▶ スキャン</div>
    <div class="tab" data-tab="photos">🖼 写真</div>
    <div class="tab" data-tab="history">≡ 履歴</div>
    <div class="tab" data-tab="settings">⚙</div>
  </div>

  <!-- カメラページ -->
  <div class="page on" id="pg-camera">
    <div class="vf-wrapper">
      <div class="vf-container" id="vf-container">
        <video id="cam-video" muted playsinline autoplay></video>
      </div>
    </div>

    <!-- スワイプ＆ボタン操作エリア -->
    <div class="cam-controls" id="cam-swipe-zone">
      <div class="ratio-ctrls">
        <button class="ratio-btn" data-ratio="4/3">4:3</button>
        <button class="ratio-btn on" data-ratio="16/9">16:9</button>
        <button class="ratio-btn" data-ratio="21/9">21:9</button>
      </div>

      <div class="shutter-wrap">
        <button id="btn-shutter" class="btn-shutter"></button>
      </div>

      <div class="side-right">
        <button id="btn-goto-scan" class="btn-scan-link">SCAN</button>
      </div>
    </div>
  </div>

  <div class="page" id="pg-scan"><div style="flex:1; background:#000; display:flex; align-items:center; justify-content:center; color:#4a6a8a;">SCANNER READY</div></div>
  <div class="page" id="pg-photos"><div class="photo-grid" id="photo-grid"></div></div>
  <div class="page" id="pg-history"></div>
  <div class="page" id="pg-settings">
    <div style="padding:20px;"><button onclick="localStorage.clear(); location.reload();" style="width:100%; padding:12px; color:red; border:1px solid red; background:none; border-radius:4px;">DELETE ALL DATA</button></div>
  </div>
</div>

<div id="toast" class="toast">SHOT</div>

<script>
/**
 * 状態管理
 * 比率リスト: インデックス0が一番上のボタン(4/3)
 */
const RATIOS = ["4/3", "16/9", "21/9"];
let currentRatioIdx = 1; // 初期 16:9
const state = {
  aspectRatio: 16/9,
  photos: []
};

window.addEventListener('load', () => {
  initTabs();
  startCamera();
  initSwipeLogic(); // スワイプ方向を修正したロジック
  
  const saved = localStorage.getItem('final_cam_photos');
  if (saved) state.photos = JSON.parse(saved);
  updateCount();

  document.getElementById('btn-shutter').addEventListener('click', takePhoto);
  
  // 比率ボタンクリック
  document.querySelectorAll('.ratio-btn').forEach((btn, idx) => {
    btn.addEventListener('click', () => setRatio(idx));
  });

  document.getElementById('btn-goto-scan').addEventListener('click', () => {
    document.querySelector('[data-tab="scan"]').click();
  });
});

/**
 * 比率変更（共通処理）
 */
function setRatio(idx) {
  if (idx < 0 || idx >= RATIOS.length) return;
  currentRatioIdx = idx;
  
  const rStr = RATIOS[idx];
  const parts = rStr.split('/');
  state.aspectRatio = parts[0] / parts[1];
  
  // ボタン表示の更新
  document.querySelectorAll('.ratio-btn').forEach((b, i) => {
    b.classList.toggle('on', i === idx);
  });
  
  // プレビュー枠の変更
  document.getElementById('vf-container').style.aspectRatio = rStr;
  
  // カメラ再設定
  startCamera();
  showToast(`MODE: ${rStr}`);
}

/**
 * 【修正版】上下スワイプロジック
 * 上にスワイプ → 4:3方向へ (インデックス減少)
 * 下にスワイプ → 21:9方向へ (インデックス増加)
 */
function initSwipeLogic() {
  const zone = document.getElementById('cam-swipe-zone');
  let startY = 0;

  zone.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
  }, { passive: true });

  zone.addEventListener('touchend', (e) => {
    const endY = e.changedTouches[0].clientY;
    const diffY = startY - endY; // 正なら上スワイプ、負なら下スワイプ

    if (Math.abs(diffY) > 35) { // 35px以上の移動で検知
      if (diffY > 0) {
        // 上にスワイプ：上のボタン(4:3)へ移動
        if (currentRatioIdx > 0) setRatio(currentRatioIdx - 1);
      } else {
        // 下にスワイプ：下のボタン(21:9)へ移動
        if (currentRatioIdx < RATIOS.length - 1) setRatio(currentRatioIdx + 1);
      }
    }
  }, { passive: true });
}

/**
 * カメラ起動 (背面固定)
 */
async function startCamera() {
  const video = document.getElementById('cam-video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        aspectRatio: { ideal: state.aspectRatio }
      }
    });
    video.srcObject = stream;
  } catch (err) {
    console.error("Camera access failed.");
  }
}

/**
 * 撮影 (超高速)
 */
function takePhoto() {
  const video = document.getElementById('cam-video');
  const canvas = document.createElement('canvas');
  
  const w = video.videoWidth;
  const h = w / state.aspectRatio;
  canvas.width = w;
  canvas.height = h;
  
  const ctx = canvas.getContext('2d', { alpha: false });
  const sy = (video.videoHeight - h) / 2;
  ctx.drawImage(video, 0, sy, w, h, 0, 0, w, h);

  if (navigator.vibrate) navigator.vibrate(12);
  showToast("SHOT");

  // 非同期で保存
  setTimeout(() => {
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    state.photos.unshift({ src: dataUrl, id: Date.now() });
    if (state.photos.length > 50) state.photos.pop();
    localStorage.setItem('final_cam_photos', JSON.stringify(state.photos));
    updateCount();
  }, 0);
}

/**
 * UIその他
 */
function initTabs() {
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab, .page').forEach(el => el.classList.remove('on'));
      t.classList.add('on');
      const target = t.dataset.tab;
      document.getElementById(`pg-${target}`).classList.add('on');
      if (target === 'photos') renderPhotos();
    });
  });
}

function renderPhotos() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = state.photos.map(p => `
    <div class="photo-item"><img src="${p.src}" loading="lazy"></div>
  `).join('');
}

function updateCount() {
  document.getElementById('hdr-count').textContent = `0 BC / ${state.photos.length} 📷`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 600);
}
</script>
</body>
</html>
